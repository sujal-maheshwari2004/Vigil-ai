apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: anomaly-artifacts-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference-service
          image: vigil-inference-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: vigil-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: INFERENCE_URL
              value: http://inference-service:8001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
    spec:
      containers:
        - name: anomaly-detector
          image: vigil-anomaly-detector:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: ANOMALY_THRESHOLD
              value: "0.8"
            - name: ARTIFACTS_DIR
              value: /artifacts
          volumeMounts:
            - name: anomaly-artifacts
              mountPath: /artifacts
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: anomaly-artifacts
          persistentVolumeClaim:
            claimName: anomaly-artifacts-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-trainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-trainer
  template:
    metadata:
      labels:
        app: anomaly-trainer
    spec:
      containers:
        - name: anomaly-trainer
          image: vigil-anomaly-trainer:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
            - name: ARTIFACTS_DIR
              value: /artifacts
            - name: RETRAIN_POLICY_ENABLED
              value: "true"
            - name: RETRAIN_INTERVAL_MINUTES
              value: "60"
            - name: RETRAIN_DATASET_NAME
              value: anomaly-metrics
            - name: RETRAIN_MODEL_NAME
              value: isolation-forest
            - name: RETRAIN_LOOKBACK_MINUTES
              value: "15"
            - name: RETRAIN_STEP_SECONDS
              value: "30"
            - name: DRIFT_POLICY_ENABLED
              value: "true"
            - name: DRIFT_INTERVAL_MINUTES
              value: "15"
            - name: DRIFT_THRESHOLD
              value: "0.35"
          volumeMounts:
            - name: anomaly-artifacts
              mountPath: /artifacts
          resources:
            requests:
              cpu: "150m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: anomaly-artifacts
          persistentVolumeClaim:
            claimName: anomaly-artifacts-pvc
