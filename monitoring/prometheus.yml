global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8000

  - job_name: inference_service
    metrics_path: /metrics
    static_configs:
      - targets:
          - inference_service:8001
