services:
  inference_service:
    build:
      context: ./inference_service
    ports:
      - "8001:8001"
    networks:
      - vigil-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      - INFERENCE_URL=http://inference_service:8001
    depends_on:
      inference_service:
        condition: service_healthy
    networks:
      - vigil-network

networks:
  vigil-network:
    driver: bridge